<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Unlocker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f0f0fa;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
      margin-top: 6px;
    }

    .drop-zone {
      border: 2px dashed #2e2e44;
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      margin-bottom: 20px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.06);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .drop-text {
      font-size: 15px;
      color: #aaa;
    }

    .drop-text strong {
      color: #a78bfa;
    }

    .drop-sub {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
    }

    .file-info {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .file-info .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #c4b5fd;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
    }

    .remove-btn:hover { color: #f87171; }

    label.field-label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="password"] {
      width: 100%;
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e8e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }

    input[type="password"]:focus {
      border-color: #7c3aed;
    }

    input[type="password"]::placeholder { color: #444; }

    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button.submit-btn:hover { opacity: 0.9; }
    button.submit-btn:active { transform: scale(0.98); }
    button.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .status.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .status.loading {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: #c4b5fd;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(196, 181, 253, 0.3);
      border-top-color: #c4b5fd;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔓</div>
      <h1>PDF Unlocker</h1>
    </div>
    <p class="subtitle">Remove password protection from any PDF instantly.</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <div class="drop-text"><strong>Click to upload</strong> or drag & drop</div>
      <div class="drop-sub">PDF files only · Max 50MB</div>
    </div>

    <div class="file-info" id="fileInfo">
      <span>📎</span>
      <span class="file-name" id="fileName"></span>
      <button class="remove-btn" id="removeFile" title="Remove">✕</button>
    </div>

    <label class="field-label" for="password">PDF Password (if required)</label>
    <input type="password" id="password" placeholder="Leave blank if not password-protected" />

    <button class="submit-btn" id="unlockBtn" onclick="unlockPDF()">Unlock & Download</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const fileInfo = document.getElementById("fileInfo");
    const fileName = document.getElementById("fileName");
    const status = document.getElementById("status");

    fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

    document.getElementById("removeFile").addEventListener("click", () => {
      fileInput.value = "";
      fileInfo.style.display = "none";
      dropZone.style.display = "";
      hideStatus();
    });

    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      const f = e.dataTransfer.files[0];
      if (f) { fileInput.files = e.dataTransfer.files; handleFile(f); }
    });

    function handleFile(f) {
      if (!f) return;
      if (!f.name.toLowerCase().endsWith(".pdf")) {
        showStatus("error", "Please select a PDF file.");
        return;
      }
      fileName.textContent = f.name;
      fileInfo.style.display = "flex";
      dropZone.style.display = "none";
      hideStatus();
    }

    function showStatus(type, msg) {
      status.className = "status " + type;
      status.style.display = "block";
      status.innerHTML = type === "loading"
        ? `<span class="spinner"></span>${msg}`
        : msg;
    }

    function hideStatus() {
      status.style.display = "none";
    }

    async function unlockPDF() {
      const file = fileInput.files[0];
      if (!file) { showStatus("error", "Please select a PDF file first."); return; }

      const btn = document.getElementById("unlockBtn");
      btn.disabled = true;
      showStatus("loading", "Removing password protection…");

      const formData = new FormData();
      formData.append("pdf", file);
      formData.append("password", document.getElementById("password").value);

      try {
        const res = await fetch("/unlock", { method: "POST", body: formData });

        if (res.ok) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          const disposition = res.headers.get("Content-Disposition");
          const match = disposition && disposition.match(/filename="?([^"]+)"?/);
          a.download = match ? match[1] : "unlocked.pdf";
          a.href = url;
          a.click();
          URL.revokeObjectURL(url);
          showStatus("success", "✓ Password removed! Your file is downloading.");
        } else {
          const data = await res.json();
          showStatus("error", data.error || "Something went wrong.");
        }
      } catch (e) {
        showStatus("error", "Network error. Please try again.");
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
